<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F1F1EC"/>
      <stop offset="100%" stop-color="#E5E5E0"/>
    </linearGradient>
    <radialGradient id="blob" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#ECB923" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#ECB923" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ECB923" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#blob)"/>

  <!-- Brand mark top-left -->
  <g transform="translate(80, 80)">
    <rect width="56" height="56" rx="14" fill="#1F1F1D"/>
    <g transform="translate(13, 12)" stroke="#ECB923" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <rect x="3" y="14" width="24" height="16" rx="3"/>
      <path d="M9 14 V9 a6 6 0 0 1 12 0 V14"/>
    </g>
    <text x="78" y="38" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="#1F1F1D">Lock<tspan fill="#8B6F1F" font-style="italic">And</tspan>Go</text>
  </g>

  <!-- Eyebrow -->
  <text x="80" y="240" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="3" fill="#556142">ÚSCHOVŇA BATOŽINY · BRATISLAVA</text>

  <!-- Headline -->
  <text x="80" y="330" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="700" fill="#1F1F1D" letter-spacing="-2">16 spotov.</text>
  <text x="80" y="425" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="700" fill="#1F1F1D" letter-spacing="-2">Jedna <tspan font-style="italic" fill="#8B6F1F">mapa</tspan>.</text>

  <!-- Sub-line -->
  <text x="80" y="495" font-family="-apple-system, system-ui, sans-serif" font-size="28" font-weight="500" fill="#2D2D2A">Hlavná stanica · Nivy · Staré Mesto · od 5,90 €/deň</text>

  <!-- URL pill -->
  <g transform="translate(80, 535)">
    <rect width="270" height="56" rx="28" fill="#1F1F1D"/>
    <text x="135" y="37" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="24" font-weight="700" fill="#FAFAF6">lockandgo.sk →</text>
  </g>

  <!-- Map-pin cluster decoration top-right -->
  <g transform="translate(870, 130)" opacity="0.95">
    <circle cx="80" cy="80" r="80" fill="#FAFAF6" stroke="#1F1F1D" stroke-width="3"/>
    <g fill="#ECB923" stroke="#1F1F1D" stroke-width="2.5">
      <circle cx="55" cy="60" r="14"/>
      <circle cx="105" cy="55" r="14"/>
      <circle cx="80" cy="100" r="14"/>
      <circle cx="50" cy="110" r="10"/>
      <circle cx="115" cy="105" r="10"/>
    </g>
  </g>
</svg>
